# Lightweight MiniLM config for M5 Mac (CPU/MPS-friendly)
# Usage: python scripts/train.py --config configs/experiments/minilm_m5.yaml --device mps

encoder:
  name: hf
  model_name_or_path: sentence-transformers/all-MiniLM-L6-v2
  pooling: mean
  freeze_backbone: true
  lora: null
  max_length: 256
  projection_dim: 128

loss:
  name: supcon
  temperature: 0.07

data:
  dataset: enron
  train_senders: 100
  emails_per_sender_k: 8
  val_split: 0.1

training:
  epochs: 10
  batch_size: 32
  lr: 1.0e-3
  scheduler: cosine
  warmup_steps: 50
  grad_clip: 1.0
  mixed_precision: false

wandb:
  project: email-fraud-detection
  entity: null
  tags:
    - minilm
    - m5
    - frozen
  notes: "Lightweight MiniLM run for M5 Mac (use --device mps); set WANDB_MODE=offline to avoid cloud logging."

confidence_tiers:
  "1-4": low
  "5-9": medium
  "10-24": high
  "25+": very_high
