# RoBERTa-base fine-tuned with LoRA + Supervised Contrastive Loss.
#
# LoRA adapts query and value projections in every transformer layer.
# SupCon (Khosla et al. NeurIPS 2020) averages InfoNCE over all same-sender
# positives in each P×K batch — the recommended starting point for this task.
#
# LoRA parameter budget (r=16):
#   12 layers × 2 matrices (q, v) × 2 LoRA matrices × (768×16 + 16×768)
#   ≈ 12 × 2 × 2 × 24576 = ~1.2M trainable params vs ~125M total.
#
# Run with:
#   python scripts/train.py --config configs/experiments/roberta_lora_supcon.yaml

encoder:
  name: hf
  model_name_or_path: roberta-base
  pooling: mean
  freeze_backbone: false    # LoRA unfreezes adapters inside peft
  max_length: 512
  projection_dim: null      # use backbone output dimension (768) directly
  lora:
    r: 16
    alpha: 32               # alpha/r = 2 — standard scaling
    target_modules:
      - query
      - value
    dropout: 0.05

loss:
  name: supcon
  temperature: 0.07         # Khosla et al. recommend 0.07–0.1

data:
  dataset: enron
  train_senders: 120
  emails_per_sender_k: 8
  val_split: 0.1
  test_split: 0.1

training:
  epochs: 20
  batch_size: 64            # P=8 × K=8
  lr: 2.0e-4                # LoRA LR typically 1e-4 – 5e-4
  scheduler: cosine
  warmup_steps: 200
  grad_clip: 1.0
  mixed_precision: true

wandb:
  project: email-fraud-detection
  name: roberta_lora_supcon
  tags:
    - roberta-base
    - lora
    - supcon
    - sft
  notes: "RoBERTa-base + LoRA (r=16) fine-tuned on Enron with SupCon loss."
