# RoBERTa-base fine-tuned with LoRA + Batch-Hard Triplet Loss.
#
# TripletLoss (Hermans et al. arXiv:1703.07737) with batch-hard mining selects
# the hardest positive/negative per anchor, focusing training on violations.
# Good when the embedding space is already reasonably structured (e.g. after a
# warm-start from a SupCon run) or when you want a hard-margin objective.
#
# Run with:
#   python scripts/train.py --config configs/experiments/roberta_lora_triplet.yaml

encoder:
  name: hf
  model_name_or_path: roberta-base
  pooling: mean
  freeze_backbone: false
  max_length: 512
  projection_dim: null
  lora:
    r: 16
    alpha: 32
    target_modules:
      - query
      - value
    dropout: 0.05

loss:
  name: triplet
  margin: 0.3               # squared-L2 margin; 0.3 is the Hermans et al. default
  mining: batch_hard

data:
  dataset: enron
  train_senders: 120
  emails_per_sender_k: 8
  val_split: 0.1
  test_split: 0.1

training:
  epochs: 20
  batch_size: 64
  lr: 2.0e-4
  scheduler: cosine
  warmup_steps: 200
  grad_clip: 1.0
  mixed_precision: true

wandb:
  project: email-fraud-detection
  name: roberta_lora_triplet
  tags:
    - roberta-base
    - lora
    - triplet
    - batch-hard
    - sft
  notes: "RoBERTa-base + LoRA (r=16) fine-tuned on Enron with batch-hard TripletLoss."
