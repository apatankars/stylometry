# V3 Fix — RoBERTa + LoRA with corrected hyperparameters (SupCon)
#
# V2 post-mortem: v2_roberta_lora_proj achieved AUROC 0.526 — *worse* than
# the frozen baseline (0.537).  Root cause: lr=2e-4 + r=16 + 20 epochs was
# too aggressive.  The adapters destabilised pretrained representations before
# they had a chance to learn authorship structure.
#
# Fixes applied (three levers, each independently motivated):
#   lr:           2e-4 → 5e-5  (standard LoRA fine-tuning range for BERT-family)
#   warmup_steps: 200  → 500   (longer ramp to prevent large early gradients)
#   r:            16   → 8     (halved rank reduces overfitting; 0.6M trainable)
#   epochs:       20   → 40    (more time for slower LR to converge)
#
# Everything else is identical to v2 for a clean comparison.

encoder:
  model_name_or_path: roberta-base
  pooling: mean
  freeze_backbone: false
  lora:
    r: 8
    alpha: 16                  # alpha/r = 2 (same effective scale as v2)
    target_modules:
      - query
      - value
    dropout: 0.05
  max_length: 512
  projection_dim: 128

loss:
  name: supcon
  temperature: 0.07

data:
  train_senders: 100
  emails_per_sender_k: 8
  val_split: 0.1
  test_split: 0.1

training:
  epochs: 40
  batch_size: 64
  lr: 5.0e-5
  scheduler: cosine
  warmup_steps: 500
  grad_clip: 1.0
  mixed_precision: true

wandb:
  name: v3_roberta_lora
  tags:
    - roberta-base
    - lora
    - projection
    - supcon
    - v3-fixed-lora
  notes: "V3: RoBERTa + LoRA fix — lr=5e-5, warmup=500, r=8, epochs=40. Ablates v2 hyperparameter failure."
