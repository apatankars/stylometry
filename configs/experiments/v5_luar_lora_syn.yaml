# V5 ablation — LUAR + LoRA + projection + synthetic hard negatives
#
# Re-run of v4_luar_lora_syn with v5 naming for direct comparison against
# v5_luar_lora within this suite.  Hyperparameters are unchanged from V4.

encoder:
  model_name_or_path: rrivera1849/LUAR-MUD
  pooling: luar_episode
  freeze_backbone: false
  lora:
    r: 16
    alpha: 32
    target_modules:
      - query
      - value
    dropout: 0.05
  max_length: 512
  projection_dim: 128
  episode_k: 4
  trust_remote_code: true

loss:
  name: supcon
  temperature: 0.07

data:
  train_senders: 100
  emails_per_sender_k: 8
  val_split: 0.1
  test_split: 0.1
  augmentation:
    synthetic_path: data/synthetic/enron_synthetic
    n_syn_per_batch: 2

training:
  epochs: 20
  batch_size: 64
  lr: 2.0e-4
  scheduler: cosine
  warmup_steps: 200
  grad_clip: 1.0
  mixed_precision: true

wandb:
  name: v5_luar_lora_syn
  tags:
    - luar
    - lora
    - projection
    - supcon
    - episode-pooling
    - synthetic-hard-negatives
    - v5-ablation
  notes: "V5 ablation: LUAR-MUD + LoRA (r=16) + synthetic hard negatives (n_syn=2). Paired with v5_luar_lora as the no-synthetic control."
