# V2 Ablation 2/6 — MPNet frozen + projection head (SupCon)
#
# all-mpnet-base-v2 is trained on 1B sentence pairs with multiple-negatives
# ranking loss, producing diverse sentence embeddings (low intra-sim at init).
# The frozen backbone + trainable 768→128 projection tests whether MPNet's
# richer semantic variety translates to stronger authorship structure.
#
# LoRA target modules for MPNet differ from RoBERTa: use ["q", "v"] not
# ["query", "value"] — relevant when you later add LoRA to this model.

encoder:
  model_name_or_path: sentence-transformers/all-mpnet-base-v2
  pooling: mean
  freeze_backbone: true
  lora: null
  max_length: 512
  projection_dim: 128

loss:
  name: supcon
  temperature: 0.07

data:
  train_senders: 100
  emails_per_sender_k: 8
  val_split: 0.1
  test_split: 0.1

training:
  epochs: 20
  batch_size: 64
  lr: 1.0e-3
  scheduler: cosine
  warmup_steps: 50
  grad_clip: 1.0
  mixed_precision: true

wandb:
  name: v2_mpnet_frozen_proj
  tags:
    - mpnet
    - frozen
    - projection
    - supcon
    - v2-ablation
  notes: "V2 ablation: frozen MPNet + 768→128 projection. Tests sentence-embedding pretrain vs. raw LM."
