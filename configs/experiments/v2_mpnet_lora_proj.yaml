# V2 Ablation 4/6 — MPNet + LoRA + projection head (SupCon)
#
# MPNet frozen was the strongest single-email baseline in v1 (best intra-inter gap).
# Adding LoRA should let the backbone adapt its diverse sentence representations
# toward authorship-specific structure.
#
# MPNet attention module names differ from RoBERTa: use "q" and "v" not
# "query" and "value".  Using wrong names silently finds no matching modules
# and applies no LoRA — the config would silently degrade to frozen.

encoder:
  model_name_or_path: sentence-transformers/all-mpnet-base-v2
  pooling: mean
  freeze_backbone: false
  lora:
    r: 16
    alpha: 32
    target_modules:
      - q                   # MPNet uses "q"/"v", not "query"/"value"
      - v
    dropout: 0.05
  max_length: 512
  projection_dim: 128

loss:
  name: supcon
  temperature: 0.07

data:
  train_senders: 100
  emails_per_sender_k: 8
  val_split: 0.1
  test_split: 0.1

training:
  epochs: 20
  batch_size: 64
  lr: 2.0e-4
  scheduler: cosine
  warmup_steps: 200
  grad_clip: 1.0
  mixed_precision: true

wandb:
  name: v2_mpnet_lora_proj
  tags:
    - mpnet
    - lora
    - projection
    - supcon
    - v2-ablation
  notes: "V2 ablation: MPNet + LoRA (r=16, q/v) + 768→128 projection. Tests LoRA on strongest frozen baseline."
